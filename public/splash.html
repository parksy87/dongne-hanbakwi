<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FEE500" />
  <title>동네한바퀴</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #FEE500;
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif;
    }
    .icon {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(60, 30, 30, 0.15);
      margin-bottom: 24px;
    }
    .icon img {
      width: 100%;
      height: 100%;
      display: block;
    }
    h1 {
      color: #3C1E1E;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 32px;
    }
    .progress {
      width: 192px;
      height: 6px;
      background: rgba(60, 30, 30, 0.2);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar {
      width: 40%;
      height: 100%;
      background: #3C1E1E;
      border-radius: 999px;
      animation: splash-progress 1.2s ease-in-out infinite;
    }
    @keyframes splash-progress {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(320%); }
    }
  </style>
</head>
<body>
  <div class="icon"><img src="/icons/icon-192x192.png" alt="동네한바퀴" /></div>
  <h1>동네한바퀴</h1>
  <div class="progress"><div class="progress-bar"></div></div>
</body>
</html>
