<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FEE500" />
  <title>동네한바퀴</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #FEE500;
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif;
    }
    .icon {
      width: 120px;
      height: 120px;
      background: white;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      box-shadow: 0 8px 32px rgba(60, 30, 30, 0.15);
      margin-bottom: 24px;
    }
    h1 {
      color: #3C1E1E;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    p {
      color: #3C1E1E;
      opacity: 0.7;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="icon">🚶</div>
  <h1>동네한바퀴</h1>
  <p>오늘도 동네한바퀴</p>
</body>
</html>
